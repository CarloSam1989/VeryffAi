{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>VeryfAI — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="shortcut icon" href="{% static 'icons/favicon.ico' %}" type="image/x-icon">
    <link rel="icon" href="{% static 'icons/favicon.ico' %}" type="image/x-icon">
  <style>
    body {
      background: linear-gradient(135deg, #1e1e2f, #4b0082);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .login-card {
      background: #fff;
      padding: 2rem;
      border-radius: 15px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0px 0px 25px rgba(0,0,0,0.3);
    }
    .logo-text {
      font-family: 'Segoe UI', sans-serif;
      font-size: 2rem;
      font-weight: bold;
      text-align: center;
      color: #4b0082;
      margin-bottom: 1rem;
    }
    .logo-text-create {
      font-family: 'Segoe UI', sans-serif;
      font-size: 1rem;
      text-align: center;
      color: #4b0082;
      margin-bottom: 1rem;
    }
    .btn-login {
      background-color: #4b0082;
      color: white;
      font-weight: bold;
    }
    .btn-login:hover {
      background-color: #2e0050;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-text">VeryffAI 🎧</div>
    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label for="username" class="form-label">Usuario</label>
        <input type="text" name="username" id="username" class="form-control" required autofocus>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" name="password" id="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-login w-100">Iniciar Sesión</button>
    </form>
       <p class="mt-3 text-center">¿No tienes cuenta? <a href="{% url 'register' %}" class="logo-text-create">Regístrate</a></p>
    
    {% if messages %}
      <div class="mt-3">
        {% for message in messages %}
          <div class="alert alert-danger p-2">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  </div>
</body>
</html>

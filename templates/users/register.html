{% extends 'base.html' %}
{% block title %}Registro - VeryffAI{% endblock %}
{% block content %}
<div class="card-style" style="max-width:400px;">
  <div class="logo-text">Crear cuenta 🎤</div>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="username" class="form-label">Usuario</label>
      <input type="text" name="username" id="username" class="form-control" required>
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Contraseña</label>
      <input type="password" name="password" id="password" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary-custom w-100">Registrarse</button>
  </form>
 

  {% if messages %}
    <div class="mt-3">
      {% for message in messages %}
        <div class="alert alert-primary p-2">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}
</div>
{% endblock %}
